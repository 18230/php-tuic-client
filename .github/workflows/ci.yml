name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cross-platform:
    name: ${{ matrix.os }} / PHP ${{ matrix.php }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        php:
          - '8.2'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: curl, ffi, json, openssl, sockets
          tools: composer:v2

      - name: Validate composer manifest
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPUnit
        run: composer test

      - name: Run dry-run command
        run: php bin/tuic-client --config=examples/node.example.yaml --dry-run

      - name: Show CLI help
        run: php bin/tuic-client --help

      - name: Lint PHP sources
        shell: bash
        run: |
          set -euo pipefail
          php -l bin/tuic-client
          while IFS= read -r -d '' file; do
            php -l "$file"
          done < <(find src tests config examples stubs -type f -name '*.php' -print0)

  ubuntu-versions:
    name: Ubuntu / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.2'
          - '8.3'
          - '8.4'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: curl, ffi, json, openssl, sockets
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPUnit
        run: composer test

  linux-native-smoke:
    name: Linux native build smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          extensions: curl, ffi, json, openssl, sockets
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build libquiche
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/build-quiche.sh
          ./scripts/build-quiche.sh

      - name: Assert built library exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "$PWD/resources/native/linux-x64/libquiche.so"
          ls -lh "$PWD/resources/native/linux-x64/libquiche.so"
