name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cross-platform:
    name: ${{ matrix.os }} / PHP ${{ matrix.php }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        php:
          - '8.2'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: curl, ffi, json, openssl, sockets
          tools: composer:v2

      - name: Validate composer manifest
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPUnit
        run: composer test

      - name: Run dry-run command
        run: php bin/tuic-client --config=examples/node.example.yaml --dry-run

      - name: Show CLI help
        run: php bin/tuic-client --help

      - name: Lint PHP sources
        shell: bash
        run: |
          set -euo pipefail
          php -l bin/tuic-client
          while IFS= read -r -d '' file; do
            php -l "$file"
          done < <(find src tests config examples stubs -type f -name '*.php' -print0)

  ubuntu-versions:
    name: Ubuntu / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.2'
          - '8.3'
          - '8.4'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: curl, ffi, json, openssl, sockets
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPUnit
        run: composer test

  linux-runtime-smoke:
    name: Linux runtime smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          extensions: curl, ffi, json, openssl, sockets
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build libquiche
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/build-quiche.sh
          ./scripts/build-quiche.sh

      - name: Run doctor command
        shell: bash
        run: |
          set -euo pipefail
          export QUICHE_LIB="$PWD/resources/native/linux-x64/libquiche.so"
          php bin/tuic-client doctor --config=examples/node.example.yaml --quiche-lib="$QUICHE_LIB"

      - name: Run shell startup smoke test
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/start-tuic-client.sh

          export PHP_BIN="$(command -v php)"
          export TUIC_CONFIG="examples/node.example.yaml"
          export TUIC_SOCKS_LISTEN="127.0.0.1:11080"
          export QUICHE_LIB="$PWD/resources/native/linux-x64/libquiche.so"

          cleanup() {
            if [ -n "${SERVER_PID:-}" ]; then
              kill "${SERVER_PID}" >/dev/null 2>&1 || true
              wait "${SERVER_PID}" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          ./scripts/start-tuic-client.sh >"${RUNNER_TEMP}/tuic.stdout.log" 2>"${RUNNER_TEMP}/tuic.stderr.log" &
          SERVER_PID=$!

          for _ in $(seq 1 30); do
            if php -r '$c=@fsockopen("127.0.0.1", 11080, $errno, $errstr, 0.5); if ($c) { fclose($c); exit(0); } exit(1);'; then
              break
            fi
            sleep 0.5
          done

          php -r '$c=@fsockopen("127.0.0.1", 11080, $errno, $errstr, 0.5); if (!$c) { fwrite(STDERR, "SOCKS5 proxy port did not start\n"); exit(1); } fclose($c);'

      - name: Print smoke logs on failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "${RUNNER_TEMP}/tuic.stdout.log" ]; then
            echo "==== stdout ===="
            cat "${RUNNER_TEMP}/tuic.stdout.log"
          fi
          if [ -f "${RUNNER_TEMP}/tuic.stderr.log" ]; then
            echo "==== stderr ===="
            cat "${RUNNER_TEMP}/tuic.stderr.log"
          fi
