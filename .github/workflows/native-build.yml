name: Native Binaries

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  QUICHE_VERSION: '0.26.1'
  BUNDLE_SUFFIX: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}

jobs:
  build-native:
    if: github.actor != 'github-actions[bot]'
    name: Build ${{ matrix.triplet }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            triplet: linux-x64
            lib_name: libquiche.so
            output_dir: resources/native/linux-x64
            shell: bash
          - os: macos-15-intel
            triplet: macos-x64
            lib_name: libquiche.dylib
            output_dir: resources/native/macos-x64
            shell: bash
          - os: windows-latest
            triplet: windows-x64
            lib_name: quiche.dll
            output_dir: resources/native/windows-x64
            shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify cmake
        run: cmake --version

      - name: Install NASM on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nasm --no-progress -y

      - name: Build libquiche on Linux/macOS
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/build-quiche.sh
          OUTPUT_DIR="$PWD/${{ matrix.output_dir }}" ./scripts/build-quiche.sh "$QUICHE_VERSION"

      - name: Build quiche.dll on Windows
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: .\scripts\build-quiche.ps1 -Version $env:QUICHE_VERSION -OutputDir "${{ matrix.output_dir }}"

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.triplet }}
          path: ${{ matrix.output_dir }}/${{ matrix.lib_name }}
          if-no-files-found: error

  package-native-bundle:
    if: github.actor != 'github-actions[bot]'
    name: Package native bundle
    runs-on: ubuntu-latest
    needs:
      - build-native

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          path: runtime/native-artifacts
          pattern: native-*
          merge-multiple: false

      - name: Assemble bundle and manifest
        shell: bash
        run: |
          set -euo pipefail
          rm -rf runtime/native-release
          mkdir -p runtime/native-release/resources/native

          for artifact_dir in runtime/native-artifacts/native-*; do
            artifact_name="$(basename "$artifact_dir")"
            triplet="${artifact_name#native-}"
            mkdir -p "runtime/native-release/resources/native/$triplet"
            cp "$artifact_dir"/* "runtime/native-release/resources/native/$triplet/"
          done

          python3 - <<'PY'
          import datetime
          import hashlib
          import json
          from pathlib import Path

          root = Path("runtime/native-release/resources/native")
          entries = []
          for path in sorted(root.glob("*/*")):
              if not path.is_file():
                  continue
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              entries.append({
                  "triplet": path.parent.name,
                  "file": path.name,
                  "sha256": digest,
                  "size": path.stat().st_size,
              })

          manifest = {
              "quiche_version": "${{ env.QUICHE_VERSION }}",
              "generated_at": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
              "source_commit": "${{ github.sha }}",
              "libraries": entries,
          }

          (root / "manifest.json").write_text(json.dumps(manifest, indent=4) + "\n", encoding="utf-8")
          PY

          (
            cd runtime/native-release
            zip -r "../php-tuic-client-native-${{ env.BUNDLE_SUFFIX }}.zip" resources/native >/dev/null
          )

      - name: Upload native bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-tuic-client-native-bundle
          path: runtime/php-tuic-client-native-${{ env.BUNDLE_SUFFIX }}.zip
          if-no-files-found: error

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: runtime/php-tuic-client-native-${{ env.BUNDLE_SUFFIX }}.zip

  vendor-native-into-repo:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
    name: Vendor native binaries into repository
    runs-on: ubuntu-latest
    needs:
      - build-native

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          path: runtime/native-artifacts
          pattern: native-*
          merge-multiple: false

      - name: Refresh resources/native
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p resources/native
          for triplet_dir in resources/native/*; do
            if [ -d "$triplet_dir" ] && [ "$(basename "$triplet_dir")" != "README.md" ]; then
              find "$triplet_dir" -maxdepth 1 -type f ! -name '.gitkeep' -delete
            fi
          done

          for artifact_dir in runtime/native-artifacts/native-*; do
            artifact_name="$(basename "$artifact_dir")"
            triplet="${artifact_name#native-}"
            mkdir -p "resources/native/$triplet"
            cp "$artifact_dir"/* "resources/native/$triplet/"
          done

          python3 - <<'PY'
          import datetime
          import hashlib
          import json
          from pathlib import Path

          root = Path("resources/native")
          entries = []
          for path in sorted(root.glob("*/*")):
              if not path.is_file():
                  continue
              if path.name == ".gitkeep":
                  continue
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              entries.append({
                  "triplet": path.parent.name,
                  "file": path.name,
                  "sha256": digest,
                  "size": path.stat().st_size,
              })

          manifest = {
              "quiche_version": "${{ env.QUICHE_VERSION }}",
              "generated_at": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
              "source_commit": "${{ github.sha }}",
              "libraries": entries,
          }

          (root / "manifest.json").write_text(json.dumps(manifest, indent=4) + "\n", encoding="utf-8")
          PY

      - name: Commit vendored native binaries
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- resources/native; then
            echo "No native binary changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resources/native
          git commit -m "chore(native): refresh prebuilt libquiche"
          git push
