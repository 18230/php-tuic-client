name: Ubuntu CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    name: PHP ${{ matrix.php }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: json, openssl, sockets, curl
          tools: composer:v2

      - name: Validate composer manifest
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPUnit
        run: composer test

      - name: Run doctor command
        run: php bin/tuic-client doctor --config=examples/node.example.yaml

      - name: Run dry-run validation
        run: php bin/tuic-client run --config=examples/node.example.yaml --dry-run

      - name: Show CLI help
        run: php bin/tuic-client --help

      - name: Lint PHP sources
        shell: bash
        run: |
          set -euo pipefail
          php -l bin/tuic-client
          while IFS= read -r -d '' file; do
            php -l "$file"
          done < <(find src tests -type f -name '*.php' -print0)
